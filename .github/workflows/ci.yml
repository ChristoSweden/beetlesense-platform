name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_POSTHOG_KEY: placeholder
          VITE_SENTRY_DSN: placeholder
          VITE_STRIPE_PUBLISHABLE_KEY: placeholder
          VITE_MAPLIBRE_STYLE: ""
          VITE_VAPID_PUBLIC_KEY: placeholder

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_POSTHOG_KEY: placeholder
          VITE_SENTRY_DSN: placeholder
          VITE_STRIPE_PUBLISHABLE_KEY: placeholder
          VITE_MAPLIBRE_STYLE: ""
          VITE_VAPID_PUBLIC_KEY: placeholder
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

  wcag:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D @axe-core/cli serve
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_POSTHOG_KEY: placeholder
          VITE_SENTRY_DSN: placeholder
          VITE_STRIPE_PUBLISHABLE_KEY: placeholder
          VITE_MAPLIBRE_STYLE: ""
          VITE_VAPID_PUBLIC_KEY: placeholder
      - name: Run axe accessibility audit
        run: |
          npx serve apps/web/dist -p 3000 &
          sleep 3
          npx axe http://localhost:3000 --exit
        continue-on-error: true
