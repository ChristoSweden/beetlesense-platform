name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/worker
  INFERENCE_IMAGE: ghcr.io/${{ github.repository }}/inference

jobs:
  ci-check:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci-check]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/workers/Dockerfile
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Inference image
        uses: docker/build-push-action@v6
        with:
          context: apps/inference
          file: apps/inference/Dockerfile
          push: true
          tags: |
            ${{ env.INFERENCE_IMAGE }}:latest
            ${{ env.INFERENCE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-supabase:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy companion-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy parcel-register --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy parcel-share --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy request-quote --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy satellite-timeseries --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy survey-status --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy upload-complete --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy upload-presign --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy vision-identify --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy alerts-subscribe --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
