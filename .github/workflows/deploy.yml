name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  REGISTRY: ghcr.io
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/worker
  INFERENCE_IMAGE: ghcr.io/${{ github.repository }}/inference

jobs:
  # Wait for CI to pass first
  ci-check:
    name: Verify CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-workers:
    name: Deploy Workers (Hetzner)
    runs-on: ubuntu-latest
    needs: [ci-check]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/workers/Dockerfile
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Inference image
        uses: docker/build-push-action@v6
        with:
          context: apps/inference
          file: apps/inference/Dockerfile
          push: true
          tags: |
            ${{ env.INFERENCE_IMAGE }}:latest
            ${{ env.INFERENCE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/beetlesense

            # Pull latest images
            docker pull ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            docker pull ${{ env.INFERENCE_IMAGE }}:${{ github.sha }}

            # Tag as latest for compose
            docker tag ${{ env.WORKER_IMAGE }}:${{ github.sha }} ${{ env.WORKER_IMAGE }}:latest
            docker tag ${{ env.INFERENCE_IMAGE }}:${{ github.sha }} ${{ env.INFERENCE_IMAGE }}:latest

            # Restart services with zero-downtime
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps inference

            # Cleanup old images
            docker image prune -f
