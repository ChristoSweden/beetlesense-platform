<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#030d05"/>
  <g transform="translate(256,256)">
    <!-- Beetle body -->
    <ellipse cx="0" cy="10" rx="72" ry="95" fill="#1a5c2e"/>
    <ellipse cx="0" cy="10" rx="72" ry="95" fill="none" stroke="#22c55e" stroke-width="4"/>
    <!-- Wing split line -->
    <line x1="0" y1="-85" x2="0" y2="105" stroke="#030d05" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-100" r="35" fill="#1a5c2e" stroke="#22c55e" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-14" cy="-108" r="6" fill="#22c55e"/>
    <circle cx="14" cy="-108" r="6" fill="#22c55e"/>
    <!-- Antennae -->
    <path d="M-12,-130 Q-30,-165 -50,-170" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M12,-130 Q30,-165 50,-170" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M-65,-30 Q-100,-45 -115,-35" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M65,-30 Q100,-45 115,-35" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M-70,10 Q-110,10 -120,20" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M70,10 Q110,10 120,20" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M-60,55 Q-95,70 -105,85" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M60,55 Q95,70 105,85" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <!-- Radar pulse rings -->
    <circle cx="0" cy="10" r="130" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="10" r="170" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.15"/>
  </g>
</svg>
