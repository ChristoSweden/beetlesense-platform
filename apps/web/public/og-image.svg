<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#030d05"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a1f0d" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Radar rings -->
  <circle cx="600" cy="240" r="120" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.15"/>
  <circle cx="600" cy="240" r="180" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.1"/>
  <circle cx="600" cy="240" r="240" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.06"/>

  <!-- Beetle icon (centered, scaled) -->
  <g transform="translate(600,230) scale(0.42)">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="72" ry="95" fill="#1a5c2e"/>
    <ellipse cx="0" cy="10" rx="72" ry="95" fill="none" stroke="#22c55e" stroke-width="4"/>
    <!-- Wing split -->
    <line x1="0" y1="-85" x2="0" y2="105" stroke="#030d05" stroke-width="3"/>
    <!-- Head -->
    <circle cx="0" cy="-100" r="35" fill="#1a5c2e" stroke="#22c55e" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-14" cy="-108" r="6" fill="#22c55e"/>
    <circle cx="14" cy="-108" r="6" fill="#22c55e"/>
    <!-- Antennae -->
    <path d="M-12,-130 Q-30,-165 -50,-170" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M12,-130 Q30,-165 50,-170" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M-65,-30 Q-100,-45 -115,-35" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M65,-30 Q100,-45 115,-35" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M-70,10 Q-110,10 -120,20" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M70,10 Q110,10 120,20" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M-60,55 Q-95,70 -105,85" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <path d="M60,55 Q95,70 105,85" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- App name -->
  <text x="600" y="460" text-anchor="middle" fill="#4ade80" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="52" font-weight="700" letter-spacing="-1">BeetleSense.ai</text>

  <!-- Tagline -->
  <text x="600" y="505" text-anchor="middle" fill="#86efac" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="22" font-weight="400" opacity="0.7">AI-Powered Forest Intelligence Platform</text>

  <!-- Bottom accent line -->
  <rect x="480" y="550" width="240" height="2" rx="1" fill="#22c55e" opacity="0.3"/>
</svg>
