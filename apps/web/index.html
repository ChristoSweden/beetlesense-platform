<!DOCTYPE html>
<html lang="sv" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030d05" />
    <meta name="description" content="BeetleSense.ai — AI-powered bark beetle detection and forest health monitoring for Swedish forestry. Satellite and drone data fusion for early detection." />

    <!-- Open Graph -->
    <meta property="og:title" content="BeetleSense.ai — AI-Powered Forest Intelligence" />
    <meta property="og:description" content="Detect bark beetle infestations weeks earlier with satellite and drone data fusion. Protect your forest with AI-powered monitoring." />
    <meta property="og:image" content="https://beetlesense.ai/og-image.png" />
    <meta property="og:url" content="https://beetlesense.ai" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BeetleSense.ai" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BeetleSense.ai — AI-Powered Forest Intelligence" />
    <meta name="twitter:description" content="Detect bark beetle infestations weeks earlier with satellite and drone data fusion. Protect your forest with AI-powered monitoring." />
    <meta name="twitter:image" content="https://beetlesense.ai/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://beetlesense.ai" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect: fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preconnect: Supabase backend -->
    <link rel="preconnect" href="https://api.beetlesense.ai" />
    <link rel="dns-prefetch" href="https://api.beetlesense.ai" />

    <!-- Preconnect: MapLibre tile server -->
    <link rel="preconnect" href="https://a.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://b.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://c.tile.openstreetmap.org" />

    <!-- DNS-prefetch: external APIs -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preload critical CSS -->
    <link rel="preload" href="/src/index.css" as="style" />

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <meta name="geo.region" content="SE" />
    <title>BeetleSense.ai — AI-driven barkborredetektion och skogsintelligens</title>

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BeetleSense",
      "url": "https://beetlesense.ai",
      "logo": "https://beetlesense.ai/og-image.png",
      "description": "AI-powered bark beetle detection and forest health monitoring for Swedish forestry.",
      "foundingDate": "2025",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://beetlesense.ai"
      }
    }
    </script>

    <!-- SoftwareApplication JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BeetleSense.ai",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "SEK"
      },
      "description": "AI-driven barkborredetektion och skogsintelligens för svenska skogsägare. Satellit- och drönardata för tidig upptäckt.",
      "inLanguage": "sv",
      "url": "https://beetlesense.ai"
    }
    </script>
  </head>
  <body class="bg-[var(--bg)] text-[var(--text)] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
