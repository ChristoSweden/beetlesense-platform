    <!-- FAQPage JSON-LD for rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does BeetleSense detect bark beetle infestations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We analyze multispectral satellite imagery (Sentinel-2) to detect changes in vegetation health indices like NDVI and moisture content. Our AI models, trained on thousands of confirmed infestations in Swedish forests, can identify stress patterns in spruce stands 2-4 weeks before visible symptoms appear."
          }
        },
        {
          "@type": "Question",
          "name": "What satellite data do you use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We primarily use Copernicus Sentinel-2 imagery providing free 10m-resolution multispectral data every 5 days. We also integrate data from Lantmäteriet laser scanning (LiDAR), SMHI weather data and Swedish Forest Agency open datasets."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are the AI detections?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our satellite-based early warning system achieves approximately 87% accuracy for bark beetle detection, validated against Swedish Forest Agency ground data. Drone surveys increase accuracy to over 95%."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use BeetleSense offline in the forest?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Field mode lets you download maps and parcel data before heading into the forest. You can capture photos, GPS coordinates and observations offline. Everything syncs automatically when you get a connection again."
          }
        }
      ]
    }
