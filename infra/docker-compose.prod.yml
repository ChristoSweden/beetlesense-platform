version: "3.9"

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    restart: always
    # No volume mounts in production — everything baked into image
    volumes: []
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info

  inference:
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=warning

  qgis-server:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      - QGIS_SERVER_LOG_LEVEL=0
