global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "beetlesense-prod"
    environment: "production"

rule_files: []

scrape_configs:
  # ---------- Prometheus self-monitoring ----------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ---------- Node Exporter (host metrics) ----------
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "host"

  # ---------- BeetleSense Workers (health + metrics endpoint) ----------
  - job_name: "beetlesense-workers"
    scrape_interval: 15s
    metrics_path: "/health/metrics"
    static_configs:
      - targets: ["worker:3002"]
        labels:
          service: "workers"
          component: "bullmq"

  # ---------- Inference Service (FastAPI metrics) ----------
  - job_name: "beetlesense-inference"
    scrape_interval: 15s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["inference:8000"]
        labels:
          service: "inference"
          component: "fastapi"

  # ---------- Redis Exporter ----------
  - job_name: "redis"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"
          component: "valkey"

  # ---------- Loki (log system health) ----------
  - job_name: "loki"
    scrape_interval: 30s
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: "loki"
